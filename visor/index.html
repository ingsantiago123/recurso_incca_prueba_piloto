<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Visor de recurso — U.INCCA</title>
<meta name="description" content="Visor embebible de recursos educativos U.INCCA, parametrizado por id_recurso.">
<meta name="robots" content="noindex, follow">
<meta name="theme-color" content="#040C38">

<link rel="icon" href="../assets/img/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="../assets/img/apple-touch-icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">

<link rel="stylesheet" href="./styles.css">
</head>
<body>

<div class="viewer" id="viewer">

  <!-- Estado: cargando -->
  <div class="state state--loading" id="stateLoading">
    <div class="spinner" aria-hidden="true"></div>
    <p>Cargando recurso…</p>
  </div>

  <!-- Estado: error -->
  <div class="state state--error" id="stateError" hidden>
    <i class="fa-solid fa-triangle-exclamation" aria-hidden="true"></i>
    <p id="stateErrorMsg">No se pudo cargar el recurso.</p>
  </div>

  <!-- Contenido real, oculto hasta que renderizarInterfaz() lo llene -->
  <main class="resource" id="resource" hidden>

    <header class="resource-header">
      <div class="resource-brand">
        <img src="../assets/img/unincca-emblem.png" alt="" aria-hidden="true">
        <span>U.INCCA · Recurso educativo</span>
      </div>
      <h1 class="resource-title" id="courseName">—</h1>
    </header>

    <section class="resource-grid">

      <article class="card card--teacher">
        <div class="card-label"><i class="fa-solid fa-chalkboard-user" aria-hidden="true"></i> Docente</div>
        <div class="teacher">
          <img class="teacher-avatar" id="teacherAvatar" src="" alt="" width="72" height="72">
          <div class="teacher-name" id="teacherName">Docente del curso</div>
        </div>
      </article>

      <article class="card card--video">
        <div class="card-label"><i class="fa-solid fa-circle-play" aria-hidden="true"></i> Video de presentación</div>
        <div class="video-frame">
          <iframe id="videoFrame" src="" title="Video de presentación del curso" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen loading="lazy"></iframe>
        </div>
      </article>

      <article class="card card--activities">
        <div class="card-label"><i class="fa-solid fa-list-check" aria-hidden="true"></i> Actividades</div>
        <div class="activities-grid" id="activitiesGrid"></div>
      </article>

    </section>
  </main>

</div>

<script src="./app.js"></script>
</body>
</html>
